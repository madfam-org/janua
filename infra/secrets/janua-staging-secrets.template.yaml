# Janua staging secrets — operator bootstrap template (PP.3b)
#
# Create the K8s Secret `janua-staging-secrets` in namespace `janua-staging`.
# NEVER reuse production values. See docs/PP_3_STAGING_AUDIT.md § Staging-secrets-template.
#
# Generate commands (run locally, paste into Secret below):
#   JWT keypair:  openssl genrsa -out /tmp/staging-private.pem 2048
#                 openssl rsa -in /tmp/staging-private.pem -pubout -out /tmp/staging-public.pem
#   JWT_SECRET:   openssl rand -base64 48
#   FIELD_ENC:    python3 -c 'from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())'
#   ADMIN_BOOT:   openssl rand -base64 24
#
# OAuth providers: register staging apps with redirect URIs:
#   https://staging-auth.madfam.io/oauth/<provider>/callback
#
# Enclii adapter gap: routine secret provisioning should move to Enclii-first
# once a janua-staging adapter exists. Until then, ops applies this template.

apiVersion: v1
kind: Secret
metadata:
  name: janua-staging-secrets
  namespace: janua-staging
type: Opaque
stringData:
  database-url: "postgresql://janua_staging:CHANGE_ME@postgres:5432/janua_staging"
  redis-url: "redis://redis:6379/1"
  jwt-secret: "CHANGE_ME"
  jwt-private-key: |
    -----BEGIN RSA PRIVATE KEY-----
    CHANGE_ME
    -----END RSA PRIVATE KEY-----
  jwt-public-key: |
    -----BEGIN PUBLIC KEY-----
    CHANGE_ME
    -----END PUBLIC KEY-----
  secret-key: "CHANGE_ME"
  field-encryption-key: "CHANGE_ME"
  dhanam-webhook-secret: "CHANGE_ME"
  resend-api-key: "CHANGE_ME"
  metrics-token: "CHANGE_ME"
