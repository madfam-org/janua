# Janua staging secrets — operator bootstrap template (PP.3b)
#
# Create the K8s Secret `janua-staging-secrets` in namespace `janua-staging`.
# NEVER reuse production values. Do not commit generated values.
#
# Generate secret material locally or through the approved secret store, then
# apply it through the authorized deployment path. This public template must stay
# scanner-safe and placeholder-only.

apiVersion: v1
kind: Secret
metadata:
  name: janua-staging-secrets
  namespace: janua-staging
type: Opaque
stringData:
  database-url: __CHANGE_ME_STAGING_SECRET_STORE__
  redis-url: __CHANGE_ME_STAGING_SECRET_STORE__
  jwt-secret: __CHANGE_ME_STAGING_SECRET_STORE__
  jwt-private-key-placeholder: __GENERATE_STAGING_PRIVATE_KEY_OUTSIDE_GIT__
  jwt-public-key-placeholder: __GENERATE_STAGING_PUBLIC_KEY_OUTSIDE_GIT__
  secret-key: __CHANGE_ME_STAGING_SECRET_STORE__
  field-encryption-key: __CHANGE_ME_STAGING_SECRET_STORE__
  dhanam-webhook-secret: __CHANGE_ME_STAGING_SECRET_STORE__
  resend-api-key: __CHANGE_ME_STAGING_SECRET_STORE__
  metrics-token: __CHANGE_ME_STAGING_SECRET_STORE__
