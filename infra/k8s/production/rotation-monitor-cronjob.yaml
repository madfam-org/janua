# Secrets rotation monitor — daily CronJob.
#
# Reads infra/secrets/SECRETS_REGISTRY.yaml (baked into the monitor
# image at build time) and emits structured alerts when any secret's
# rotation is overdue or inside the reminder window. Exits non-zero
# on any actionable finding so Alertmanager — which scrapes K8s Job
# exit codes via kube-state-metrics — pages on-call.
#
# Pattern mirrors the revenue-loop-probe CronJob already in-flight
# at autoswarm-office/packages/revenue-loop-probe/k8s/.
#
# Apply:
#   kubectl apply -f rotation-monitor-cronjob.yaml
#
# Or via enclii:
#   enclii apply infra/k8s/production/rotation-monitor-cronjob.yaml
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: secrets-rotation-monitor
  namespace: janua
  labels:
    app.kubernetes.io/name: secrets-rotation-monitor
    app.kubernetes.io/part-of: madfam-ecosystem
spec:
  # Daily at 13:05 UTC (07:05 CST Mexico City). Offset a few minutes
  # past the top of the hour so we don't fight other daily cron jobs.
  schedule: "5 13 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 7
  failedJobsHistoryLimit: 14
  jobTemplate:
    spec:
      backoffLimit: 0
      activeDeadlineSeconds: 300
      template:
        metadata:
          labels:
            app.kubernetes.io/name: secrets-rotation-monitor
        spec:
          restartPolicy: Never
          containers:
            - name: monitor
              image: ghcr.io/madfam-org/janua-api:latest
              imagePullPolicy: Always
              # The monitor is pure Python + pyyaml; reuse the janua-api
              # image to avoid maintaining a separate one. Registry file
              # ships in the image at /app/infra/secrets/SECRETS_REGISTRY.yaml.
              command: ["python", "/app/scripts/secrets/rotation_monitor.py"]
              args: []
              env:
                - name: SECRETS_REGISTRY_PATH
                  value: /app/infra/secrets/SECRETS_REGISTRY.yaml
                - name: SLACK_WEBHOOK_URL
                  valueFrom:
                    secretKeyRef:
                      name: rotation-monitor-secrets
                      key: SLACK_WEBHOOK_URL
                      optional: true
              resources:
                requests:
                  cpu: 20m
                  memory: 64Mi
                limits:
                  cpu: 100m
                  memory: 128Mi
