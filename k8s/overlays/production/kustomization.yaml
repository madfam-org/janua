# ArgoCD watches this path (see infra/argocd/config.json). Image digests
# land here ONLY via promote-to-prod.yml — never from docker-publish.yml.
#
# Ops note: after this overlay lands, re-point the janua ArgoCD Application
# source path from k8s/base/deployments → k8s/overlays/production.

