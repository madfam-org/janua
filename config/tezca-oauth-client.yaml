    idTokenClaims:
      - sub
      - name
      - email
      - email_verified
      - picture
      - updated_at

    userinfoClaims:
      - sub
      - name
      - given_name
      - family_name
      - email
      - email_verified
      - picture
      - locale

    idTokenSigningAlg: RS256

    requirePkce: true
    pkceCodeChallengeMethod: S256

  # ==========================================================================
  # TOKEN CONFIGURATION
  # ==========================================================================
  tokens:
    accessToken:
      lifetime: 900
      format: jwt

    refreshToken:
      lifetime: 604800
      rotateOnUse: true
      reuseInterval: 30
      absoluteLifetime: 2592000

    idToken:
      lifetime: 3600

    authorizationCode:
      lifetime: 60

  # ==========================================================================
  # SECURITY CONFIGURATION
  # ==========================================================================
  security:
    clientType: confidential

    authentication:
      requireClientAuth: true
      methods:
        - client_secret_post

    validation:
      requireExactRedirectUri: true
      requireState: true
      requireNonce: true

    rateLimit:
      tokenRequests:
        perMinute: 60
        burst: 10
      authRequests:
        perMinute: 30
        burst: 5

  # ==========================================================================
  # CONSENT CONFIGURATION
  # ==========================================================================
  consent:
    skipConsent: true
    rememberConsent: true
    rememberDuration: 2592000

  # ==========================================================================
  # AUDIT & COMPLIANCE
  # ==========================================================================
  audit:
    enabled: true
    events:
      - authorization_request
      - authorization_grant
      - authorization_deny
      - token_issued
      - token_refreshed
      - token_revoked
      - userinfo_request
      - logout
    retentionDays: 90

  metadata:
    softwareId: "tezca-admin-v1"
    softwareVersion: "1.0.0"
    registrationAccessToken: ""
    secretHash: ""

---
# Secrets for Tezca OAuth clients
apiVersion: v1
kind: Secret
metadata:
  name: tezca-oauth-credentials
  namespace: madfam-platform
  labels:
    app: tezca
    component: oauth
type: Opaque
stringData:
  web-client-secret: "${TEZCA_WEB_CLIENT_SECRET}"
  admin-client-secret: "${TEZCA_ADMIN_CLIENT_SECRET}"

---
# Custom scopes for Tezca
apiVersion: janua.io/v1
kind: OAuthScope
metadata:
  name: tezca-scopes
  namespace: madfam-platform
spec:
  scopes:
    - name: tezca:read
      description: "Read access to legislation data"
      claims:
        - tezca_tier

    - name: tezca:export
      description: "Export access based on user tier"
      claims:
        - tezca_tier
        - tezca_plan

    - name: tezca:admin
      description: "Administrative access to Tezca platform"
      claims:
        - tezca_admin
        - tezca_tier
