    janua.io/description: "Tezca admin panel - data operations and system management"
    janua.io/owner: platform-team
    janua.io/created: "2026-02-23"

spec:
  # ==========================================================================
  # CLIENT IDENTIFICATION
  # ==========================================================================
  client:
    id: jnc_dyS_lo50uQU81nsuFsWaHZbnTKYTWe2m
    name: "Tezca Admin Panel"
    description: "Administration panel for Tezca data operations and system management"
    uri: "https://admin.tezca.mx"
    contacts:
