# Tezca OAuth Client Configuration
# ==================================
# OAuth 2.0 / OIDC client configuration for Tezca
# Two clients: web (public portal) + admin (management panel)
#
# Relationship:
# - Janua is the OAuth 2.0 Authorization Server / OIDC Provider
# - Tezca Web/Admin are OAuth 2.0 Clients / Relying Parties
#
# Flow: User → Tezca → Janua (auth) → Tezca (callback) → User session

apiVersion: janua.io/v1
kind: OAuthClient
metadata:
  name: tezca-web
  namespace: madfam-platform
  labels:
    app: tezca
    component: web
    tier: product
    environment: production
  annotations:
    janua.io/description: "Tezca public portal - Mexican legislation search and browse"
    janua.io/owner: platform-team
    janua.io/created: "2026-02-23"

spec:
  # ==========================================================================
  # CLIENT IDENTIFICATION
  # ==========================================================================
  client:
    id: jnc_e3T94-MNy1dXAUNR5KetwduopRALT_nR
    name: "Tezca — Portal de Legislación Mexicana"
    description: "Public portal for searching and browsing Mexican federal and state legislation"
    uri: "https://tezca.mx"
    contacts:
      - "admin@madfam.io"

  # ==========================================================================
  # OAUTH 2.0 CONFIGURATION
  # ==========================================================================
  oauth:
    grantTypes:
      - authorization_code
      - refresh_token

    responseTypes:
      - code

    tokenEndpointAuthMethod: client_secret_post

    redirectUris:
      # Production
      - "https://tezca.mx/api/auth/callback"
      # Local development
      - "http://localhost:3000/api/auth/callback"

    postLogoutRedirectUris:
      - "https://tezca.mx"
      - "http://localhost:3000"

    allowedCorsOrigins:
      - "https://tezca.mx"
      - "http://localhost:3000"

  # ==========================================================================
  # OPENID CONNECT CONFIGURATION
  # ==========================================================================
  oidc:
    allowedScopes:
      - openid
      - profile
      - email
      - offline_access
      # Custom scopes for Tezca
      - tezca:read    # Read access to legislation data
      - tezca:export  # Export access based on user tier

    idTokenClaims:
      - sub
      - name
      - email
      - email_verified
      - picture
      - updated_at

    userinfoClaims:
      - sub
      - name
      - given_name
      - family_name
      - email
      - email_verified
      - picture
      - locale

    idTokenSigningAlg: RS256

    requirePkce: true
    pkceCodeChallengeMethod: S256

  # ==========================================================================
  # TOKEN CONFIGURATION
  # ==========================================================================
  tokens:
    accessToken:
      lifetime: 900       # 15 minutes
      format: jwt

    refreshToken:
      lifetime: 604800    # 7 days
      rotateOnUse: true
      reuseInterval: 30
      absoluteLifetime: 2592000  # 30 days

    idToken:
      lifetime: 3600      # 1 hour

    authorizationCode:
      lifetime: 60        # 1 minute

  # ==========================================================================
  # SECURITY CONFIGURATION
  # ==========================================================================
  security:
    clientType: confidential

    authentication:
      requireClientAuth: true
      methods:
        - client_secret_post

    validation:
      requireExactRedirectUri: true
      requireState: true
      requireNonce: true

    rateLimit:
      tokenRequests:
        perMinute: 60
        burst: 10
      authRequests:
        perMinute: 30
        burst: 5

  # ==========================================================================
  # CONSENT CONFIGURATION
  # ==========================================================================
  consent:
    skipConsent: true      # First-party MADFAM app
    rememberConsent: true
    rememberDuration: 2592000  # 30 days

  # ==========================================================================
  # AUDIT & COMPLIANCE
  # ==========================================================================
  audit:
    enabled: true
    events:
      - authorization_request
      - authorization_grant
      - authorization_deny
      - token_issued
      - token_refreshed
      - token_revoked
      - userinfo_request
      - logout
    retentionDays: 90

  metadata:
    softwareId: "tezca-web-v1"
    softwareVersion: "1.0.0"
    registrationAccessToken: ""
    secretHash: ""

---
