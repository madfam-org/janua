name: Sync prod GitOps overlay

# Break-glass: reconcile k8s/overlays/production when ArgoCD/Enclii has not
# applied a digest-only promote (Pattern B manual gate). Prefer:
#   enclii ops apps sync janua-services -n argocd --apply --reason "..."
# from an operator workstation when possible.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "sync-now" to apply production overlay to cluster'
        required: true
        default: ''
        type: string
      component:
        description: 'Wait for rollout on this deployment (blank = janua-website only)'
        required: false
        default: 'janua-website'
        type: string

permissions:
  contents: read

env:
  NAMESPACE: janua
  ARGO_APP: janua-services

jobs:
  sync:
    name: Apply production overlay
    runs-on: ${{ vars.ARC_BOOTSTRAP_COMPLETE == 'true' && 'madfam-runners-blue' || 'ubuntu-latest' }}
    if: github.event.inputs.confirm == 'sync-now'
    steps:
      - uses: actions/checkout@v6

      - uses: azure/setup-kubectl@v5
        with:
          version: 'v1.29.0'

      - uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: '5.3.0'

      - name: Configure kubeconfig (break-glass fallback)
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG_PRODUCTION }}
        run: |
          set -euo pipefail
          if [ -z "${KUBECONFIG_B64:-}" ]; then
            echo "::warning::KUBECONFIG_PRODUCTION not configured"
            exit 0
          fi
          mkdir -p ~/.kube
          echo "$KUBECONFIG_B64" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
          if [ -n "${KUBERNETES_SERVICE_HOST:-}" ]; then
            CURRENT_CONTEXT="$(kubectl config current-context)"
            CLUSTER_NAME="$(kubectl config view --raw -o jsonpath="{.contexts[?(@.name==\"${CURRENT_CONTEXT}\")].context.cluster}")"
            kubectl config set-cluster "${CLUSTER_NAME}" \
              --server="https://${KUBERNETES_SERVICE_HOST}:${KUBERNETES_SERVICE_PORT:-443}"
            echo "ARC runner: repointed kubeconfig to in-cluster API server"
          fi

      - name: Test cluster connectivity
        id: connectivity
        run: |
          if kubectl cluster-info --request-timeout=10s &>/dev/null; then
            echo "connected=true" >> "$GITHUB_OUTPUT"
          else
            echo "connected=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Cluster API unreachable from this runner — Enclii API path remains primary."
          fi

      - name: Refresh GHCR pull secret in janua namespace
        if: steps.connectivity.outputs.connected == 'true'
        run: |
          set -euo pipefail
          if kubectl get secret ghcr-credentials -n dhanam &>/dev/null; then
            kubectl get secret ghcr-credentials -n dhanam -o json | python3 -c '
          import json, sys
          s = json.load(sys.stdin)
          meta = s.setdefault("metadata", {})
          meta["namespace"] = "janua"
          for k in ("resourceVersion", "uid", "creationTimestamp", "managedFields"):
              meta.pop(k, None)
          json.dump(s, sys.stdout)
          ' | kubectl apply -f -
            echo "Refreshed janua/ghcr-credentials from dhanam"
          else
            echo "::warning::dhanam/ghcr-credentials missing — cannot refresh janua pull secret"
          fi

      - name: Clear stuck Argo operation (in-cluster)
        if: steps.connectivity.outputs.connected == 'true'
        run: |
          kubectl patch application "${{ env.ARGO_APP }}" -n argocd --type json \
            -p='[{"op": "remove", "path": "/operation"}]' 2>/dev/null || true
          kubectl annotate application "${{ env.ARGO_APP }}" -n argocd \
            argocd.argoproj.io/refresh=hard --overwrite || true

      - name: Sync via Enclii ops API (operator workstation path)
        if: false
        run: |
          echo "Use: enclii ops apps sync janua-services -n argocd --apply --reason \"...\""
          echo "Ops API requires admin OAuth — ENCLII_CALLBACK_TOKEN is lifecycle-only."

      - name: Apply production kustomize overlay (kubectl fallback)
        if: steps.connectivity.outputs.connected == 'true'
        run: |
          kustomize build k8s/overlays/production > /tmp/janua-production.yaml
          echo "Website image in manifest:"
          grep 'image: ghcr.io/madfam-org/janua-website' /tmp/janua-production.yaml || true
          kubectl apply -f /tmp/janua-production.yaml

      - name: Wait for rollout
        if: steps.connectivity.outputs.connected == 'true'
        run: |
          TARGET="${{ inputs.component }}"
          if [[ -n "$TARGET" ]]; then
            kubectl rollout status "deployment/$TARGET" -n "$NAMESPACE" --timeout=300s
          else
            kubectl rollout status deployment/janua-website -n "$NAMESPACE" --timeout=300s
          fi

      - name: Smoke janua.dev
        run: |
          set -euo pipefail
          for i in 1 2 3 4 5 6; do
            home_html=$(curl -fsSL "https://janua.dev/" || true)
            css_path=$(echo "$home_html" | grep -oE '/_next/static/chunks/[^"]+\.css' | head -1 || true)
            if [ -n "$css_path" ]; then
              css=$(curl -fsSL "https://janua.dev${css_path}" || true)
              if echo "$css" | grep -q '\.flex{' \
                && echo "$css" | grep -q -- '--font-display' \
                && echo "$home_html" | grep -q 'Edge-Fast Identity Platform' \
                && curl -fsSI "https://janua.dev/pricing" | grep -q '200' \
                && curl -fsSI "https://janua.dev/legal/privacy" | grep -q '200'; then
                echo "Landing metadata, pricing, legal, and Tailwind utilities present"
                exit 0
              fi
            fi
            echo "Waiting for janua.dev rollout (attempt $i)..."
            sleep 15
          done
          echo "::error::janua.dev smoke did not pass within timeout"
          exit 1
