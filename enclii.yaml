apiVersion: enclii.dev/v1
kind: Service
metadata:
  name: janua
  project: janua

# RFC 0001 promotion policy — Janua is Pattern B (manual gate) because
# it is the ecosystem auth floor. Every other MADFAM service depends on
# Janua's JWTs; a wrong promote breaks every downstream login. Blast
# radius is maximum. The promote-to-prod.yml workflow's scheduled
# auto-promote job is disabled via the repo variable AUTO_PROMOTE_ENABLED
# (default: unset -> evaluated as "false"); leaving this value "manual"
# here is the policy record.
promotion:
  pattern: manual
  min_soak_minutes: 30
  require_smoke_pass: true

spec:
  # status.madfam.io tracking — Janua is the ecosystem auth floor.
  # Pre-existing entries on the platform configmap were hand-added in
  # the legacy era (before zero-touch). Declaring them here locks them
  # into the regenerate path so the next `POST /v1/admin/status/regenerate`
  # cannot silently drop them. See Phase 2 follow-up backfill 2026-04-27.
  status:
    enabled: true
    entries:
      - name: Auth
        url: https://auth.madfam.io/health
        href: https://auth.madfam.io
        group: Janua
        family: MADFAM Platform
        description: SSO authentication service
      - name: Janua Website
        url: https://janua.dev
        href: https://janua.dev
        group: Janua
        family: MADFAM Platform
        description: Product landing page
      - name: Janua Docs
        url: https://docs.janua.dev
        href: https://docs.janua.dev
        group: Janua
        family: MADFAM Platform
        description: Authentication documentation
  runtime:
    port: 8080
    replicas: 1
    healthCheck: /api/v1/health/ready
  domains:
    - name: api.janua.dev
      environment: production
    - name: app.janua.dev
      environment: production
    - name: admin.janua.dev
      environment: production
    - name: auth.madfam.io
      environment: production
    - name: janua.dev
      environment: production
    - name: www.janua.dev
      environment: production
    - name: madfam.io
      environment: production
    - name: www.madfam.io
      environment: production
