{{- if .Values.backup.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "janua.fullname" . }}-backup
  labels:
    {{- include "janua.labels" . | nindent 4 }}
    app.kubernetes.io/component: backup
spec:
  schedule: {{ .Values.backup.schedule | quote }}
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            {{- include "janua.selectorLabels" . | nindent 12 }}
            app.kubernetes.io/component: backup
        spec:
          restartPolicy: OnFailure
          {{- with .Values.imagePullSecrets }}
          imagePullSecrets:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          serviceAccountName: {{ include "janua.serviceAccountName" . }}
          securityContext:
            {{- toYaml .Values.podSecurityContext | nindent 12 }}
          containers:
            - name: backup
              image: postgres:15-alpine
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  echo "Starting backup at $(date)"
                  
                  # Create backup
                  BACKUP_FILE="/tmp/backup-$(date +%Y%m%d-%H%M%S).sql.gz"
                  PGPASSWORD=$POSTGRES_PASSWORD pg_dump \
                    -h {{ include "janua.fullname" . }}-postgresql \
                    -U {{ .Values.postgresql.auth.username }} \
                    -d {{ .Values.postgresql.auth.database }} \
                    --no-owner \
                    --no-acl \
                    | gzip > $BACKUP_FILE
                  
                  echo "Backup created: $BACKUP_FILE"
                  
                  # Note: Cloud upload handled by in-cluster CronJob to Cloudflare R2

                  echo "Backup completed at $(date)"
              env:
                - name: POSTGRES_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "janua.fullname" . }}-secret
                      key: database-password
                - name: RETENTION_DAYS
                  value: {{ .Values.backup.retention | quote }}
              resources:
                requests:
                  memory: "256Mi"
                  cpu: "100m"
                limits:
                  memory: "512Mi"
                  cpu: "500m"
{{- end }}