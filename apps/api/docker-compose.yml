name: janua

services:
  janua-postgres:
    image: postgres:15-alpine
    container_name: janua-postgres
    environment:
      POSTGRES_USER: janua
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in an untracked local env file}"
      POSTGRES_DB: janua_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U janua"]
      interval: 5s
      timeout: 5s
      retries: 5

  janua-redis:
    image: redis:7-alpine
    container_name: janua-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  janua-api:
    build: .
    container_name: janua-api
    ports:
      - "4100:4100"
    environment:
      DATABASE_URL: "${DATABASE_URL:?set DATABASE_URL in an untracked local env file}"
      REDIS_URL: "${REDIS_URL:?set REDIS_URL in an untracked local env file}"
      SECRET_KEY: "${SECRET_KEY:?set SECRET_KEY in an untracked local env file}"
      DEBUG: "true"
      PORT: "4100"
    depends_on:
      janua-postgres:
        condition: service_healthy
      janua-redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app
    command: sh -c "alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 4100 --reload"

volumes:
  postgres_data: